# Multi-Resume Build and Deploy Workflow
# Builds both AI/ML Engineering and Software Developer resume variants

name: build-resumes
on: [push]
jobs:
  build-ai-resume:
    runs-on: ubuntu-latest
    env:
      DIR: .
      FILE: resumeai
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Build AI/ML Engineering Resume
        uses: dante-ev/latex-action@latest
        with:
          root_file: ${{ env.FILE }}
          working_directory: ${{ env.DIR }}
      - name: Move AI Resume
        run: mkdir -p github_artifacts && mv ${{ env.DIR }}/${{ env.FILE }}.pdf ./github_artifacts/
      - name: Upload AI Resume as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumeai.pdf
          path: ./github_artifacts

  build-software-resume:
    runs-on: ubuntu-latest
    env:
      DIR: .
      FILE: resumesoftware
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Build Software Developer Resume
        uses: dante-ev/latex-action@latest
        with:
          root_file: ${{ env.FILE }}
          working_directory: ${{ env.DIR }}
      - name: Move Software Resume
        run: mkdir -p github_artifacts && mv ${{ env.DIR }}/${{ env.FILE }}.pdf ./github_artifacts/
      - name: Upload Software Resume as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resumesoftware.pdf
          path: ./github_artifacts
  deploy:
    needs: [build-ai-resume, build-software-resume]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download AI Resume
        uses: actions/download-artifact@v4
        with:
          name: resumeai.pdf
          path: github_artifacts
      - name: Download Software Resume
        uses: actions/download-artifact@v4
        with:
          name: resumesoftware.pdf
          path: github_artifacts
      - name: Prepare deployment files
        run: |
          mkdir -p github_deploy
          # Copy PDFs from artifacts (they're in subdirectories)
          find github_artifacts -name "*.pdf" -exec cp {} github_deploy/ \;
          # Copy other files
          cp index.html github_deploy/
          cp CNAME github_deploy/ 2>/dev/null || true
          # List files for debugging
          ls -la github_deploy/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github_deploy
          publish_branch: build
          force_orphan: true
          enable_jekyll: true